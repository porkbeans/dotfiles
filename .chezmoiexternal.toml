[".local/bin/rustup-init"]
type = "file"
url = "https://sh.rustup.rs"
executable = true
refreshPeriod = "168h"

[".local/bin/uv-init"]
type = "file"
url = "https://astral.sh/uv/install.sh"
executable = true
refreshPeriod = "168h"

[".local/bin/volta-init"]
type = "file"
url = "https://get.volta.sh"
executable = true
refreshPeriod = "168h"

[".local/bin/sdkman-init"]
type = "file"
url = "https://get.sdkman.io?rcupdate=false"
executable = true
refreshPeriod = "168h"

[".local/bin/ghcup-init"]
type = "file"
url = "https://get-ghcup.haskell.org"
executable = true
refreshPeriod = "168h"

[".local/bin/choosenim-init"]
type = "file"
url = "https://nim-lang.org/choosenim/init.sh"
executable = true
refreshPeriod = "168h"

[".local/bin/dagger-init"]
type = "file"
url = "https://dl.dagger.io/dagger/install.sh"
executable = true
refreshPeriod = "168h"

[".local/bin/kerl"]
type = "file"
url = "https://raw.githubusercontent.com/kerl/kerl/master/kerl"
executable = true
refreshPeriod = "168h"

[".local/bin/k0s-init"]
type = "file"
url = "https://get.k0s.sh"
executable = true
refreshPeriod = "168h"

[".local/bin/hcloud"]
type = "archive-file"
url = {{ gitHubLatestReleaseAssetURL "hetznercloud/cli" "hcloud-linux-amd64.tar.gz" | quote }}
executable = true
path = "hcloud"

[".local/bin/ovhcloud"]
type = "archive-file"
url = {{ gitHubLatestReleaseAssetURL "ovh/ovhcloud-cli" "ovhcloud-cli_Linux_x86_64.tar.gz" | quote }}
executable = true
path = "ovhcloud"

[".local/bin/slack-init"]
type = "file"
url = "https://downloads.slack-edge.com/slack-cli/install.sh"
executable = true
refreshPeriod = "168h"

[".vim/autoload/plug.vim"]
type = "file"
url = "https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim"
refreshPeriod = "168h"

[".local/share/nvim/site/autoload/plug.vim"]
type = "file"
url = "https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim"
refreshPeriod = "168h"

[".zsh/.antidote"]
type = "git-repo"
url = "git@github.com:mattmc3/antidote.git"
refreshPeriod = "168h"
